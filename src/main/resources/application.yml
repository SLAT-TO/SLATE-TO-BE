spring:
  application:
    name: slatto

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs

youtube:
  api:
    key: ${YOUTUBE_API_KEY}
    connect-timeout: ${YOUTUBE_API_CONNECT_TIMEOUT:3s}
    read-timeout: ${YOUTUBE_API_READ_TIMEOUT:5s}
